imports:
    - { resource: tables.yml }

services:
    uflagmey.donationcampaigns.listener.permission:
        class: uflagmey\donationcampaigns\event\permission_listener
        tags:
            - { name: event.listener }

    uflagmey.donationcampaigns.listener.user_setup:
        class: uflagmey\donationcampaigns\event\user_setup_listener
        tags:
            - { name: event.listener }

    uflagmey.donationcampaigns.campaign_repository:
        class: uflagmey\donationcampaigns\repository\campaign_repository
        arguments:
            - '@dbal.conn'
            - '%uflagmey.donationcampaigns.tables.campaigns%'

    uflagmey.donationcampaigns.donation_repository:
        class: uflagmey\donationcampaigns\repository\donation_repository
        arguments:
            - '@dbal.conn'
            - '%uflagmey.donationcampaigns.tables.donations%'

    uflagmey.donationcampaigns.topic_repository:
        class: uflagmey\donationcampaigns\repository\topic_repository
        arguments:
            - '@dbal.conn'
            - '%core.table_prefix%topics'

    uflagmey.donationcampaigns.currency_formatter:
        class: uflagmey\donationcampaigns\service\currency_formatter
        arguments:
            - '@language'

    uflagmey.donationcampaigns.listener.viewtopic:
        class: uflagmey\donationcampaigns\event\viewtopic_listener
        arguments:
            - '@uflagmey.donationcampaigns.campaign_service'
            - '@uflagmey.donationcampaigns.currency_formatter'
            - '@config'
            - '@template'
            - '@language'
            # The topic-tools link is gated by the forum-scoped access rule and
            # points at the frontend management route generated by the helper.
            - '@uflagmey.donationcampaigns.access'
            - '@user'
            - '@controller.helper'
        tags:
            - { name: event.listener }

    uflagmey.donationcampaigns.listener.topic_delete:
        class: uflagmey\donationcampaigns\event\topic_delete_listener
        arguments:
            - '@uflagmey.donationcampaigns.campaign_service'
        tags:
            - { name: event.listener }

    uflagmey.donationcampaigns.listener.forum_delete:
        class: uflagmey\donationcampaigns\event\forum_delete_listener
        arguments:
            - '@uflagmey.donationcampaigns.campaign_service'
        tags:
            - { name: event.listener }

    uflagmey.donationcampaigns.donation_service:
        class: uflagmey\donationcampaigns\service\donation_service
        arguments:
            # The connection is injected to open transactions. This service
            # issues no SQL of its own.
            - '@dbal.conn'
            - '@uflagmey.donationcampaigns.campaign_repository'
            - '@uflagmey.donationcampaigns.donation_repository'

    uflagmey.donationcampaigns.settings_service:
        class: uflagmey\donationcampaigns\service\settings_service
        arguments:
            - '@config'
            - '@uflagmey.donationcampaigns.campaign_repository'
            - '@uflagmey.donationcampaigns.donation_repository'

    uflagmey.donationcampaigns.access:
        class: uflagmey\donationcampaigns\service\access
        arguments:
            # The single source of the forum-scoped campaign authorization rule.
            # Consumed by the frontend controllers and the topic-tools link.
            - '@auth'

    uflagmey.donationcampaigns.controller.campaign:
        class: uflagmey\donationcampaigns\controller\campaign_controller
        arguments:
            - '@controller.helper'
            - '@path_helper'
            - '@template'
            - '@language'
            - '@config'
            - '@request'
            - '@log'
            - '@user'
            - '@uflagmey.donationcampaigns.access'
            - '@uflagmey.donationcampaigns.campaign_service'
            - '@uflagmey.donationcampaigns.campaign_repository'
            - '@uflagmey.donationcampaigns.donation_repository'
            - '@uflagmey.donationcampaigns.topic_repository'
            - '@uflagmey.donationcampaigns.currency_formatter'

    uflagmey.donationcampaigns.controller.donation:
        class: uflagmey\donationcampaigns\controller\donation_controller
        arguments:
            - '@controller.helper'
            - '@path_helper'
            - '@template'
            - '@language'
            - '@config'
            - '@request'
            - '@log'
            - '@user'
            - '@uflagmey.donationcampaigns.access'
            - '@uflagmey.donationcampaigns.donation_service'
            - '@uflagmey.donationcampaigns.donation_repository'
            - '@uflagmey.donationcampaigns.campaign_service'
            - '@uflagmey.donationcampaigns.topic_repository'
            - '@uflagmey.donationcampaigns.currency_formatter'

    uflagmey.donationcampaigns.description_formatter:
        class: uflagmey\donationcampaigns\service\description_formatter

    uflagmey.donationcampaigns.campaign_service:
        class: uflagmey\donationcampaigns\service\campaign_service
        arguments:
            # The connection is injected to open transactions. This service
            # issues no SQL of its own.
            - '@dbal.conn'
            - '@uflagmey.donationcampaigns.campaign_repository'
            - '@uflagmey.donationcampaigns.donation_repository'
            - '@uflagmey.donationcampaigns.topic_repository'
            - '@uflagmey.donationcampaigns.description_formatter'
